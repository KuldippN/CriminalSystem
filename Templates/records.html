{% extends "base.html" %} {% block title %} Criminal Records {% endblock %} {%
block content %}

<div class="d-flex justify-content-between align-items-center mb-3">
  <h3>Criminal Records</h3>

  <a href="/dashboard" class="btn btn-secondary"> ⬅ Back </a>
</div>

<div class="card shadow">
  <div class="card-body">
    <table class="table table-striped table-hover">
      <thead class="table-dark">
        <tr>
          <th>ID</th>
          <th>Name</th>
          <th>Age</th>
          <th>Crime</th>
          <th>Photo</th>
        </tr>
      </thead>

      <tbody>
        {% for c in criminals %}

        <tr>
          <td>{{ c.id }}</td>
          <td>{{ c.name }}</td>
          <td>{{ c.age }}</td>
          <td>{{ c.crime }}</td>

          <td>
            <img
              src="{{ url_for('static', filename='uploads/' + c.image) }}"
              width="60"
              class="rounded"
            />
          </td>
        </tr>

        {% endfor %}
      </tbody>
    </table>
  </div>
</div>

{% endblock %}
