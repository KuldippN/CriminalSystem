<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>{% block title %}Criminal Record System{% endblock %}</title>

<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

/* Make full height layout */
html, body{
height:100%;
}

/* Flex layout to push footer down */
body{
display:flex;
flex-direction:column;
}

/* Main content area */
.main-content{
flex:1;
}

</style>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

</head>

<body>

<!-- ================= HEADER ================= -->

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">

<div class="container">

<a class="navbar-brand" href="/dashboard">
Criminal Record System
</a>

<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
<span class="navbar-toggler-icon"></span>
</button>

<div class="collapse navbar-collapse" id="menu">

<ul class="navbar-nav ms-auto">

<li class="nav-item">
<a class="nav-link" href="/dashboard">Dashboard</a>
</li>

<li class="nav-item">
<a class="nav-link" href="/add">Add Criminal</a>
</li>

<li class="nav-item">
<a class="nav-link" href="/records">Records</a>
</li>

<li class="nav-item">
<a class="nav-link" href="/recognition">Recognition</a>
</li>

<li class="nav-item">
<a class="nav-link" href="/search">Search</a>
</li>

<li class="nav-item">
<a class="nav-link text-danger" href="/">Logout</a>
</li>

</ul>

</div>

</div>

</nav>

<!-- ================= MAIN CONTENT ================= -->

<div class="container mt-4 main-content">

{% block content %}

{% endblock %}

</div>

<!-- ================= FOOTER ================= -->

<footer class="bg-dark text-light text-center p-3">

<p class="mb-0">
Criminal Record Management System with Face Recognition
</p>

<small>BCA Final Year Project</small>

</footer>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
