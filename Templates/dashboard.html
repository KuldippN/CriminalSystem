<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>CRMS Dashboard</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />

    <style>
      body {
        font-family: "Poppins", sans-serif;
        min-height: 100vh;
        display: flex;
      }

      /* Sidebar */

      .sidebar {
        width: 240px;
        background: linear-gradient(180deg, #0f2027, #203a43, #2c5364);
        color: white;
        padding-top: 20px;
      }

      .sidebar h4 {
        text-align: center;
        margin-bottom: 30px;
      }

      .sidebar a {
        display: block;
        color: white;
        padding: 12px 20px;
        text-decoration: none;
        font-size: 15px;
      }

      .sidebar a:hover {
        background: rgba(255, 255, 255, 0.1);
      }

      /* Content */

      .content {
        flex: 1;
        background: #f4f6f9;
        padding: 30px;
      }

      /* Topbar */

      .topbar {
        background: white;
        padding: 15px 25px;
        border-radius: 10px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        margin-bottom: 25px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      /* Cards */

      .stat-card {
        border: none;
        border-radius: 12px;
        padding: 25px;
        color: white;
        box-shadow: 0 6px 15px rgba(0, 0, 0, 0.15);
      }

      .card1 {
        background: linear-gradient(135deg, #1c92d2, #2c5364);
      }

      .card2 {
        background: linear-gradient(135deg, #134e5e, #71b280);
      }

      .card3 {
        background: linear-gradient(135deg, #4568dc, #b06ab3);
      }
    </style>
  </head>

  <body>
    <!-- Sidebar -->

    <div class="sidebar">
      <h4>CRMS</h4>

      <a href="/dashboard"><i class="fa fa-home"></i> Dashboard</a>

      <a href="/add_criminal"><i class="fa fa-user-plus"></i> Add Criminal</a>

      <a href="/records"><i class="fa fa-database"></i> Criminal Records</a>

      <a href="#"><i class="fa fa-camera"></i> Face Recognition</a>

      <a href="/logout"><i class="fa fa-sign-out-alt"></i> Logout</a>
    </div>

    <!-- Main Content -->

    <div class="content">
      <!-- Topbar -->

      <div class="topbar">
        <h5>Dashboard</h5>

        <div>Welcome, <b>{{ session.get('user') }}</b></div>
      </div>

      <!-- Statistics -->

      <div class="row">
        <div class="col-md-4">
          <div class="stat-card card1">
            <h6>Total Criminals</h6>

            <h2>24</h2>
          </div>
        </div>

        <div class="col-md-4">
          <div class="stat-card card2">
            <h6>Active Cases</h6>

            <h2>12</h2>
          </div>
        </div>

        <div class="col-md-4">
          <div class="stat-card card3">
            <h6>Captured Today</h6>

            <h2>3</h2>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
